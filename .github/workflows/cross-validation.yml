name: Cross-validation

# Dedicated workflow for the libhkl-backed cross-validation suite.
# The default ``ci.yml`` installs only pip dependencies; ``hklpy2``
# does not bring ``libhkl`` over pip (conda-forge only), so cross-
# validation tests skip silently in that workflow.  This workflow
# installs the conda-forge ``hklpy2`` (which pulls ``libhkl`` and
# ``gobject-introspection``) and runs the marker-filtered suite.
#
# Failures here do not block ``ci.yml`` because this is a separate
# workflow.

on:
  push:
    branches: [main]
    paths:
      - "src/hklpy2_solvers/**"
      - "tests/test_cross_validation.py"
      - "tests/_hkl_library_probe.py"
      - "tests/__init__.py"
      - "pyproject.toml"
      - ".github/workflows/cross-validation.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/hklpy2_solvers/**"
      - "tests/test_cross_validation.py"
      - "tests/_hkl_library_probe.py"
      - "tests/__init__.py"
      - "pyproject.toml"
      - ".github/workflows/cross-validation.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cross-validation:
    name: Run cross-validation with conda-forge libhkl
    runs-on: ubuntu-latest

    defaults:
      run:
        # micromamba activates the named environment automatically
        # when ``shell: bash -l {0}`` is used.
        shell: bash -l {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history so hatch-vcs can stamp a version

      - name: Set up micromamba environment
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-name: cross-validation
          # ``python=3.14`` pins the workflow to the same interpreter
          # series as the maintainer's local conda env (see
          # :issue:`83`).  Retained as good env hygiene; the K6C
          # ``bissector_horizontal`` triclinic bootstrap fragility
          # tracked in the same issue is mitigated in code by the
          # retry loop in
          # ``tests/test_cross_validation.py::_build_simulator``,
          # but three cases still need ``CI_ENV_DEPENDENT_GAPS``
          # xfails because no retry produces a UB the mode accepts
          # in this env.
          create-args: >-
            python=3.14
            hkl
            hklpy2
            ad-hoc-diffractometer
            numpy
            pytest
          condarc: |
            channels:
              - conda-forge
            channel_priority: strict
          cache-environment: true

      - name: Install pip-only dependencies
        # ``diffcalc-core`` is the only runtime dep not on conda-forge.
        # If a conda-forge feedstock later falls behind the
        # ``pyproject.toml`` floor, add ``pip install --upgrade`` lines
        # for the affected packages here.
        #
        # ``ad-hoc-diffractometer`` is upgraded from PyPI because the
        # conda-forge feedstock trails the ``pyproject.toml`` floor
        # (>=0.11.2); remove once conda-forge catches up (:issue:`117`).
        run: |
          pip install diffcalc-core
          pip install --upgrade "ad_hoc_diffractometer>=0.11.2"

      - name: Install hklpy2_solvers (editable, no deps)
        # Use --no-deps because all runtime deps are already provided
        # above; pip would otherwise attempt to reinstall over the
        # conda env.
        run: pip install --no-deps -e .

      - name: Record installed package versions (debug)
        run: |
          micromamba list -n cross-validation || true
          pip list

      - name: Key package versions (issue #83 diagnostic)
        # Focused summary of the packages that drive cross-validation
        # behaviour; full lists above are kept for forensics.
        run: |
          python --version
          micromamba list -n cross-validation 2>/dev/null \
            | awk '$1 ~ /^(hkl|hklpy2|ad-hoc-diffractometer|numpy|diffcalc-core|gobject-introspection)$/ \
                   {printf "  %-30s %s\n", $1, $2}'

      - name: Confirm libhkl loads via gobject-introspection
        run: |
          python -c "
          import gi
          gi.require_version('Hkl', '5.0')
          from gi.repository import Hkl
          print(f'libhkl loaded; Hkl module: {Hkl}')
          "

      - name: Run cross-validation suite
        # pytest-cov is intentionally NOT installed in this env -
        # coverage gating belongs in ``ci.yml``, not here - so the
        # ``--no-cov`` flag the original spec called for is omitted
        # (pytest would otherwise reject it as an unknown argument).
        run: pytest tests/test_cross_validation.py -m cross_validation -v
