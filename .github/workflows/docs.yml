name: Publish Sphinx Docs to GitHub Pages

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy documentation'
        type: boolean
        required: true
        default: false

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:

  docs:
    name: Build and publish documentation
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history so hatch-vcs can read git tags

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package with doc dependencies
        run: pip install -e .[doc]

      - name: Determine DOC_VERSION
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="latest"
          fi
          echo "DOC_VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "Publishing docs as: ${VERSION}"

      - name: Build Sphinx documentation
        run: python3 -m sphinx -b html docs/source docs/build/html

      - name: Generate root redirect page
        run: |
          mkdir -p docs/build/redirect
          cat > docs/build/redirect/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=latest/">
              <link rel="canonical" href="latest/">
              <title>Redirecting to latest documentation</title>
            </head>
            <body>
              <p>Redirecting to <a href="latest/">latest documentation</a>…</p>
            </body>
          </html>
          EOF

      - name: Upload docs as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-${{ env.DOC_VERSION }}
          path: docs/build/html

      - name: Deploy to gh-pages — latest/ (main push)
        uses: peaceiris/actions-gh-pages@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: docs/build/html
          destination_dir: latest
          keep_files: true

      - name: Deploy root redirect to gh-pages (main push)
        uses: peaceiris/actions-gh-pages@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: docs/build/redirect
          destination_dir: .
          keep_files: true

      - name: Deploy to gh-pages — <version>/ (tag push)
        uses: peaceiris/actions-gh-pages@v4
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: docs/build/html
          destination_dir: ${{ env.DOC_VERSION }}
          keep_files: true

      - name: Clone gh-pages for switcher / pruning
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        run: |
          set -euo pipefail
          git clone --branch gh-pages --depth 1 \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            gh-pages-clone

      - name: Remove pre-release doc directories from gh-pages on stable tag
        if: >
          github.event_name == 'push' &&
          startsWith(github.ref, 'refs/tags/') &&
          !contains(env.DOC_VERSION, 'a') &&
          !contains(env.DOC_VERSION, 'b') &&
          !contains(env.DOC_VERSION, 'rc')
        run: |
          set -euo pipefail
          VERSION="${DOC_VERSION}"
          PRUNED=()
          for dir in gh-pages-clone/${VERSION}{a,b,rc}*/; do
            [ -d "${dir}" ] || continue
            rm -rf "${dir}"
            PRUNED+=("${dir}")
            echo "Removed directory: ${dir}"
          done
          if [[ ${#PRUNED[@]} -eq 0 ]]; then
            echo "No pre-release directories found for ${VERSION}."
          fi

      - name: Regenerate switcher.json from gh-pages version directories
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        run: |
          set -euo pipefail
          SWITCHER="gh-pages-clone/latest/_static/switcher.json"
          mkdir -p "$(dirname "${SWITCHER}")"

          python3 - <<'PYEOF'
          import json, os, re
          from pathlib import Path

          gh_pages = Path("gh-pages-clone")
          switcher_path = Path(os.environ["SWITCHER"])
          base_url = "https://prjemian.github.io/hklpy2_solvers"
          ref = os.environ.get("GITHUB_REF", "")
          tag_version = ref[len("refs/tags/"):] if ref.startswith("refs/tags/") else ""

          version_re = re.compile(r"^v?\d+\.\d+\.\d+([abc]|rc)?\d*$")
          discovered = sorted(
              {
                  p.name
                  for p in gh_pages.iterdir()
                  if p.is_dir() and version_re.match(p.name)
              }
          )
          if tag_version and tag_version not in discovered:
              discovered.append(tag_version)

          def is_prerelease(v):
              return bool(re.search(r"(a|b|rc)\d+$", v))

          stable = [v for v in discovered if not is_prerelease(v)]
          preferred = max(stable, key=lambda v: [int(x) for x in v.lstrip("v").split(".")]) if stable else None
          if tag_version and not is_prerelease(tag_version):
              preferred = tag_version

          def version_key(v):
              try:
                  return [int(x) for x in v.lstrip("v").split(".")]
              except ValueError:
                  return []

          discovered.sort(key=version_key, reverse=True)

          entries = [{"version": "latest", "url": f"{base_url}/latest/"}]
          for v in discovered:
              entry = {"version": v, "url": f"{base_url}/{v}/"}
              if v == preferred:
                  entry["preferred"] = True
              entries.append(entry)

          with open(switcher_path, "w") as f:
              json.dump(entries, f, indent=4)
              f.write("\n")
          print(f"Wrote {switcher_path} with {len(entries)} entries (preferred={preferred}).")
          PYEOF
        env:
          SWITCHER: gh-pages-clone/latest/_static/switcher.json

      - name: Commit switcher.json and pruned directories to gh-pages
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
        run: |
          cd gh-pages-clone
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No switcher.json or pruning changes to commit."
            exit 0
          fi
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            MSG="ci: release ${DOC_VERSION}: regenerate switcher.json, prune pre-release docs"
          else
            MSG="ci: regenerate switcher.json from existing version directories"
          fi
          git commit -m "${MSG}"
          git pull --rebase origin gh-pages
          git push

      - name: Deploy root redirect to gh-pages (tag push)
        uses: peaceiris/actions-gh-pages@v4
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: docs/build/redirect
          destination_dir: .
          keep_files: true

      - name: Deploy on manual trigger
        uses: peaceiris/actions-gh-pages@v4
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: docs/build/html
          destination_dir: latest
          keep_files: true

      - name: Deploy root redirect on manual trigger
        uses: peaceiris/actions-gh-pages@v4
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: docs/build/redirect
          destination_dir: .
          keep_files: true
