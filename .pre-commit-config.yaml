# hint: pre-commit run --all-files

default_language_version:
  python: python3.12

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-ast
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=2000"]
      - id: mixed-line-ending
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-case-conflict
      - id: check-executables-have-shebangs
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.5
    hooks:
      - id: insert-license
        name: insert-license (src)
        files: ^src/hklpy2_solvers/(?!_version).*\.py$
        args:
          - --license-filepath=.copyright.txt
          - --comment-style=#
          - --no-extra-eol
      - id: insert-license
        name: insert-license (tests)
        files: ^tests/test_.*\.py$
        args:
          - --license-filepath=.copyright.txt
          - --comment-style=#
          - --no-extra-eol
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff # replaces Flake8, isort, pydocstyle, pyupgrade
        args:
          - --fix
      - id: ruff-format # replaces Black
